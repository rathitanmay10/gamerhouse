# ─────────────────────────────────────────────────────────────────────────────
# GamerHouse — Nginx Reverse Proxy Config
#
# Domain:  gamerhouse.isroot.in
# Proxies: port 80/443 (host) → port 8000 (Docker web container)
#
# This file is a TEMPLATE — deploy.sh replaces __DOMAIN__ at deploy time.
# Certbot will modify this file to add SSL directives automatically.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    # Certbot will redirect this to HTTPS automatically.
    # Until certbot runs, this serves plain HTTP (useful during first bootstrap).

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
    }

    # Serve Django static files directly from the Docker volume mount
    # (faster than hitting Gunicorn for static assets)
    location /static/ {
        alias /opt/gamerhouse/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# ── HTTPS block ───────────────────────────────────────────────────────────────
# Certbot (`certbot --nginx`) will populate the ssl_certificate paths below
# and add the redirect from HTTP → HTTPS automatically.
# Do NOT manually edit the section below — certbot manages it.
