# ─────────────────────────────────────────────────────────────────────────────
# GamerHouse — CI/CD Pipeline
#
# Triggers: push to `dev` branch  |  PR merged into `dev`
# Steps:    build image → push GHCR → SSH into EC2 → bootstrap + deploy
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to EC2

on:
  push:
    branches: [dev, ci-test]
  pull_request:
    types: [closed]
    branches: [dev]
  workflow_dispatch:

# Cancel any in-flight run for the same branch so we never deploy stale code
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/tanmayrathi-gkmit/gamerhouse

jobs:
  run-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: gamerhouse_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        healthcheck:
          test: ["CMD-SHELL", "pg_isready -U postgres"]
          interval: 10s
          timeout: 5s
          retries: 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        healthcheck:
          test: ["CMD", "redis-cli", "ping"]
          interval: 10s
          timeout: 5s
          retries: 5

    env:
      DJANGO_SETTINGS_MODULE: gamer_house.settings
      SECRET_KEY: "django-insecure-test-key"
      DEBUG: "True"
      ALLOWED_HOSTS: "*"
      POSTGRES_NAME: gamerhouse_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      REDIS_CACHE_URL: redis://localhost:6379/1
      FRONTEND_URL: "http://localhost:3000"
      EMAIL_HOST: "localhost"
      EMAIL_PORT: 1025
      EMAIL_HOST_USER: "test@example.com"
      EMAIL_HOST_PASSWORD: "testpassword"
      DEFAULT_FROM_EMAIL: "noreply@example.com"
      RAZORPAY_KEY_ID: "rzp_test_key"
      RAZORPAY_KEY_SECRET: "test_secret"
      RAZORPAY_WEBHOOK_SECRET: "webhook_secret"
      AUTH_THROTTLE_RATE: "1000/minute"
      LOG_LEVEL: "DEBUG"
      LOG_FILE_ENABLED: "False"
      LOG_CONSOLE_ENABLED: "True"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run Pytest
        run: |
          uv run pytest

  build-and-deploy:
    needs: run-tests
    # For PRs, only run if the PR was actually merged (not just closed)
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to GHCR

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Login to GHCR ─────────────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 3. Build metadata (tags + labels) ────────────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      # ── 4. Set up Docker Buildx ───────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 5. Build & push image to GHCR ────────────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

      # ── 6. Deploy to EC2 via SSH ─────────────────────────────────────────────
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 600s
          script: |
            # Set up target directory if it doesn't exist
            sudo mkdir -p /opt/gamerhouse
            sudo chown -R ${{ secrets.EC2_USER }}:${{ secrets.EC2_USER }} /opt/gamerhouse

            # Clone repo if missing, otherwise pull latest
            if [ ! -d "/opt/gamerhouse/.git" ]; then
              git clone --branch ${{ github.ref_name }} https://github.com/tanmayrathi-gkmit/gamerhouse.git /opt/gamerhouse
            fi

            cd /opt/gamerhouse
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}

            # Inject secrets as env vars for the deploy script
            export DEPLOY_BRANCH="${{ github.ref_name }}"
            export DJANGO_SECRET_KEY="${{ secrets.DJANGO_SECRET_KEY }}"
            export POSTGRES_NAME="${{ secrets.POSTGRES_NAME }}"
            export POSTGRES_USER="${{ secrets.POSTGRES_USER }}"
            export POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"
            export CELERY_BROKER_URL="redis://redis:6379/0"
            export CELERY_RESULT_BACKEND="redis://redis:6379/2"
            export REDIS_CACHE_URL="redis://redis:6379/1"
            export EMAIL_HOST="${{ secrets.EMAIL_HOST }}"
            export EMAIL_PORT="${{ secrets.EMAIL_PORT }}"
            export EMAIL_HOST_USER="${{ secrets.EMAIL_HOST_USER }}"
            export EMAIL_HOST_PASSWORD="${{ secrets.EMAIL_HOST_PASSWORD }}"
            export DEFAULT_FROM_EMAIL="${{ secrets.DEFAULT_FROM_EMAIL }}"
            export RAZORPAY_KEY_ID="${{ secrets.RAZORPAY_KEY_ID }}"
            export RAZORPAY_KEY_SECRET="${{ secrets.RAZORPAY_KEY_SECRET }}"
            export RAZORPAY_WEBHOOK_SECRET="${{ secrets.RAZORPAY_WEBHOOK_SECRET }}"
            export FRONTEND_URL="${{ secrets.FRONTEND_URL }}"
            export ALLOWED_HOSTS="gamerhouse.isroot.in,localhost,127.0.0.1"
            export DOMAIN="gamerhouse.isroot.in"
            export GHCR_TOKEN="${{ secrets.GHCR_PAT }}"
            export GHCR_USER="${{ github.actor }}"
            export IMAGE_NAME="${{ env.IMAGE_NAME }}:latest"
            export NEW_RELIC_LICENSE_KEY="${{ secrets.NEW_RELIC_LICENSE_KEY }}"
            export NEW_RELIC_APP_NAME="GamerHouse-Prod"

            bash scripts/deploy.sh
